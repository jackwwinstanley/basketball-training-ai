<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoDaysOff — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #f0ede6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #161a24;
      border: 1px solid #2a2f45;
      border-radius: 16px;
      padding: 40px 40px 48px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .logo-sub {
      font-size: 12px;
      color: #8892a4;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: #c8883a;
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .headline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .subline {
      font-size: 13px;
      color: #8892a4;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: #fff;
      color: #1f2937;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .google-btn:hover {
      background: #f3f4f6;
    }

    .google-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .footer-note {
      font-size: 11px;
      color: #4a5068;
      margin-top: 24px;
      line-height: 1.6;
    }

    .court-lines {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      opacity: 0.03;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <!-- Negative left/right margin lets the logo span the full card width,
         ignoring the card's own padding, since the logo PNG has its own
         built-in whitespace border. mix-blend-mode: screen makes the logo's
         black background pixels invisible against this dark page background
         (the background-removal tool used on the PNG only got partway there). -->
    <div style="margin-bottom: 20px; margin-left: -40px; margin-right: -40px;">
      <img src="/static/logo.png" alt="NoDaysOff"
        style="width: 100%; height: auto; object-fit: contain; mix-blend-mode: screen; display: block;">
    </div>
    <div class="logo-sub">AI Basketball Training</div>
    <div class="divider"></div>
    <div class="headline">Welcome back</div>
    <div class="subline">Sign in to access your personalized practice plans, training history, and progress tracking.
    </div>
    <!-- /auth/google in app.py starts the OAuth redirect to Google's login page;
         no client-side JS needed, this is a plain link. -->
    <a href="/auth/google" class="google-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          fill="#4285F4" />
        <path
          d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          fill="#34A853" />
        <path
          d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          fill="#FBBC05" />
        <path
          d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          fill="#EA4335" />
      </svg>
      Continue with Google
    </a>
    <div class="footer-note">By signing in you agree to use this app for basketball training purposes. Your data is
      stored securely and never shared.</div>
  </div>
</body>

</html>
